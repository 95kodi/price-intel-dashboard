<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Price Intel Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  header {
    padding: 20px 24px 16px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  header p { font-size: 12px; color: #64748b; margin-top: 3px; }
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
  }
  button {
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:disabled { opacity: .45; cursor: default; }
  #start-btn { background: #4f46e5; color: #fff; }
  #start-btn:not(:disabled):hover { opacity: .9; }
  #stop-btn { background: #fee2e2; color: #b91c1c; display: none; }
  label.dry {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: #475569; margin-left: auto; cursor: pointer;
  }
  .progress-wrap { padding: 14px 24px 0; }
  .bar {
    height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden;
  }
  .bar > div {
    height: 100%; width: 0%; background: #4f46e5; border-radius: 999px;
    transition: width .3s;
  }
  #current {
    font-size: 12.5px; color: #475569; padding: 8px 0 4px;
    min-height: 24px; display: flex; align-items: center; gap: 7px;
  }
  .spinner {
    width: 12px; height: 12px; border: 2px solid #c7d2fe; border-top-color: #4f46e5;
    border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #log {
    flex: 1; overflow-y: auto; margin: 8px 24px;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  }
  #log:empty::after {
    content: "Results will appear here. Click Start Scan to begin.";
    display: block; text-align: center; color: #94a3b8; font-size: 12.5px; padding: 32px 16px;
  }
  .row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 8px 14px; border-bottom: 1px solid #f1f5f9; font-size: 12.5px;
  }
  .row:last-child { border-bottom: none; }
  .row .mark { font-weight: 700; flex-shrink: 0; }
  .row.ok .mark { color: #059669; }
  .row.fail .mark { color: #dc2626; }
  .row .plat { font-weight: 600; flex-shrink: 0; }
  .row .prod { color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .price { margin-left: auto; font-weight: 600; flex-shrink: 0; }
  .row .err { margin-left: auto; color: #dc2626; font-size: 11.5px; text-align: right; }
  footer {
    padding: 12px 24px 16px; font-size: 12.5px; color: #475569;
    display: flex; gap: 16px; border-top: 1px solid #e2e8f0; background: #fff;
  }
  footer .good { color: #059669; font-weight: 600; }
  footer .bad { color: #dc2626; font-weight: 600; }
</style>
</head>
<body>
  <header>
    <h1>Price Intel Scraper Agent</h1>
    <p id="backend">Connecting…</p>
  </header>

  <div class="controls">
    <button id="start-btn">Start Scan</button>
    <button id="stop-btn">Stop</button>
    <label class="dry"><input type="checkbox" id="dry-run" /> Dry run (don't save)</label>
  </div>

  <div class="progress-wrap">
    <div class="bar"><div id="progress-fill"></div></div>
    <div id="current"><span class="spinner" id="spin"></span><span id="current-text">Idle</span></div>
  </div>

  <div id="log"></div>

  <footer>
    <span id="sum-status">Ready</span>
    <span class="good" id="sum-ok" hidden></span>
    <span class="bad" id="sum-fail" hidden></span>
  </footer>

<script>
  const $ = (id) => document.getElementById(id);
  let total = 0, done = 0, running = false;

  window.agent.info().then((i) => {
    $("backend").textContent = `Backend: ${i.apiBase} · v${i.version}`;
  });

  function setRunning(on) {
    running = on;
    $("start-btn").style.display = on ? "none" : "";
    $("stop-btn").style.display = on ? "" : "none";
    $("spin").style.display = on ? "" : "none";
    $("dry-run").disabled = on;
  }

  $("start-btn").addEventListener("click", async () => {
    $("log").innerHTML = "";
    $("sum-ok").hidden = true;
    $("sum-fail").hidden = true;
    $("progress-fill").style.width = "0%";
    total = 0; done = 0;
    setRunning(true);
    $("sum-status").textContent = "Scanning…";
    $("current-text").textContent = "Loading product list…";
    await window.agent.start({ dryRun: $("dry-run").checked });
  });

  $("stop-btn").addEventListener("click", () => {
    $("sum-status").textContent = "Stopping after current item…";
    window.agent.cancel();
  });

  window.agent.onEvent((e) => {
    if (e.type === "discovery") {
      $("current-text").textContent = `Checking URL mappings… ${e.checked}/${e.total}`;
    } else if (e.type === "products") {
      total = e.total;
      $("current-text").textContent = `${total} product(s) with URLs to scan`;
    } else if (e.type === "product") {
      done = e.index;
      $("progress-fill").style.width = total ? `${Math.round((e.index / total) * 100)}%` : "0%";
      $("current-text").textContent = `${e.index + 1}/${e.total} — ${e.name}`;
    } else if (e.type === "platform") {
      $("current-text").textContent = `${e.product} — ${e.platform}…`;
    } else if (e.type === "result") {
      const row = document.createElement("div");
      row.className = "row " + (e.ok ? "ok" : "fail");
      row.innerHTML = e.ok
        ? `<span class="mark">✓</span><span class="plat"></span><span class="prod"></span><span class="price"></span>`
        : `<span class="mark">✕</span><span class="plat"></span><span class="prod"></span><span class="err"></span>`;
      row.querySelector(".plat").textContent = e.platform;
      row.querySelector(".prod").textContent = e.product;
      if (e.ok) row.querySelector(".price").textContent = "₹" + Number(e.price).toLocaleString("en-IN");
      else row.querySelector(".err").textContent = e.error;
      $("log").appendChild(row);
      $("log").scrollTop = $("log").scrollHeight;
    } else if (e.type === "done") {
      setRunning(false);
      $("progress-fill").style.width = e.cancelled ? $("progress-fill").style.width : "100%";
      $("current-text").textContent = e.cancelled ? "Scan stopped" : "Scan complete";
      $("sum-status").textContent = e.cancelled ? "Stopped" : "Finished";
      $("sum-ok").textContent = `${e.succeeded} updated`;
      $("sum-ok").hidden = false;
      if (e.failed > 0) {
        $("sum-fail").textContent = `${e.failed} failed`;
        $("sum-fail").hidden = false;
      }
      window.agent.testDone();
    } else if (e.type === "error") {
      setRunning(false);
      $("current-text").textContent = "Error: " + e.message;
      $("sum-status").textContent = "Error";
      window.agent.testDone();
    }
  });
</script>
</body>
</html>
